<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa em JS...</title>
    <style>
        body{
            background-color: lightblue;
            color: rgb(44, 43, 43);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>    <!-- Comentário -->
    <script>
        var numero1 = Number(window.prompt('Digite um número: '))
        var numero2 = Number(window.prompt('Digite outro número: '))
        var soma = (numero1 + numero2)
        window.alert(`A soma entre os números ${numero1} e ${numero2} é igual a: ${soma}`)
    </script>
</body>
</html>
